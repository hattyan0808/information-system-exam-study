<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>情報システムデザイン 満点対策</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f7fb;color:#172033;display:grid;place-items:center;min-height:100vh;padding:24px;box-sizing:border-box}
    .box{max-width:560px;background:#fff;border:1px solid #dde3ee;border-radius:18px;padding:28px;box-shadow:0 12px 36px rgba(25,50,90,.08);text-align:center}
    .spinner{width:34px;height:34px;border:4px solid #dce5f4;border-top-color:#173f7a;border-radius:50%;margin:0 auto 18px;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    h1{font-size:22px;margin:0 0 8px}p{color:#5a6577;line-height:1.7;margin:0}
  </style>
</head>
<body>
  <div class="box" id="status"><div class="spinner"></div><h1>問題サイトを読み込み中</h1><p>初回表示には数秒かかる場合があります。</p></div>
  <script>
  (async()=>{
    try{
      const files=['site_part_1.txt','site_part_2.txt','site_part_3.txt','site_part_4.txt','site_part_5.txt'];
      const parts=await Promise.all(files.map(async f=>{
        const r=await fetch(f,{cache:'no-store'});
        if(!r.ok) throw new Error(f+' の読み込みに失敗しました');
        return (await r.text()).trim();
      }));
      const b64=parts.join('');
      const bin=atob(b64);
      const bytes=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
      const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      const html=await new Response(stream).text();
      const cleanedHtml=html.replace('<button class="btn-ghost" onclick="openPracticePreset(\'cp\')">クリティカルパス図を解く</button>','');

      const overrideStyle=`<style>
        .topbar{position:static!important;top:auto!important}
        .sticky-mini{position:static!important;top:auto!important}
        @media(max-width:820px){.sidebar{position:static!important;top:auto!important}}
        .auto-figure{border:1px solid #dfe3f0;background:#fbfcff;border-radius:16px;padding:16px;margin:0 0 22px}
        .auto-figure svg{width:100%;height:auto;display:block;max-height:360px}
        .auto-figure .figurecap{font-size:13px;color:#7d8699;margin-top:10px}
      </style>`;

      const enhancement=`<script>
      (()=>{
        const cpmFigure=\`<div class="auto-figure">
          <svg viewBox="0 0 780 260" xmlns="http://www.w3.org/2000/svg" aria-label="クリティカルパスのネットワーク図">
            <defs><marker id="autoArrowCpm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#5a5fdb"/></marker></defs>
            <style>.an{fill:#fff;stroke:#5a5fdb;stroke-width:2}.at{font:700 16px system-ui,sans-serif;fill:#172033}.ae{stroke:#5a5fdb;stroke-width:2.2;marker-end:url(#autoArrowCpm);fill:none}.ad{font:600 14px system-ui,sans-serif;fill:#4b5298}</style>
            <line class="ae" x1="60" y1="125" x2="150" y2="65"/><text class="ad" x="102" y="87">2日</text>
            <line class="ae" x1="60" y1="125" x2="150" y2="125"/><text class="ad" x="101" y="116">4日</text>
            <line class="ae" x1="60" y1="125" x2="150" y2="205"/><text class="ad" x="100" y="184">7日</text>
            <line class="ae" x1="190" y1="65" x2="310" y2="125"/><text class="ad" x="246" y="88">3日</text>
            <line class="ae" x1="190" y1="125" x2="310" y2="125"/><text class="ad" x="246" y="116">1日</text>
            <line class="ae" x1="190" y1="125" x2="310" y2="175"/><text class="ad" x="245" y="157">2日</text>
            <line class="ae" x1="190" y1="205" x2="310" y2="205"/><text class="ad" x="246" y="196">4日</text>
            <line class="ae" x1="350" y1="125" x2="470" y2="75"/><text class="ad" x="404" y="91">4日</text>
            <line class="ae" x1="350" y1="125" x2="675" y2="125"/><text class="ad" x="510" y="116">12日</text>
            <line class="ae" x1="350" y1="175" x2="590" y2="175"/><text class="ad" x="468" y="166">8日</text>
            <line class="ae" x1="350" y1="205" x2="590" y2="175"/><text class="ad" x="470" y="202">10日</text>
            <line class="ae" x1="510" y1="75" x2="675" y2="125"/><text class="ad" x="588" y="91">9日</text>
            <line class="ae" x1="630" y1="175" x2="675" y2="125"/><text class="ad" x="646" y="158">3日</text>
            <circle class="an" cx="40" cy="125" r="20"/><text class="at" x="40" y="131" text-anchor="middle">A</text>
            <circle class="an" cx="170" cy="65" r="20"/><text class="at" x="170" y="71" text-anchor="middle">D</text>
            <circle class="an" cx="170" cy="125" r="20"/><text class="at" x="170" y="131" text-anchor="middle">B</text>
            <circle class="an" cx="170" cy="205" r="20"/><text class="at" x="170" y="211" text-anchor="middle">F</text>
            <circle class="an" cx="330" cy="125" r="20"/><text class="at" x="330" y="131" text-anchor="middle">C</text>
            <circle class="an" cx="330" cy="175" r="20"/><text class="at" x="330" y="181" text-anchor="middle">E</text>
            <circle class="an" cx="330" cy="205" r="20"/><text class="at" x="330" y="211" text-anchor="middle">G</text>
            <circle class="an" cx="490" cy="75" r="20"/><text class="at" x="490" y="81" text-anchor="middle">H</text>
            <circle class="an" cx="610" cy="175" r="20"/><text class="at" x="610" y="181" text-anchor="middle">I</text>
            <circle class="an" cx="700" cy="125" r="20"/><text class="at" x="700" y="131" text-anchor="middle">J</text>
          </svg>
          <div class="figurecap">各矢印の日数を合計し、AからJまでの最長経路を求める。</div>
        </div>\`;

        const cpmIds=['22a13','22b13','23a13','23b13','2413','2516'];
        function addFigures(){
          cpmIds.forEach(id=>{
            const card=document.querySelector('article[data-id="'+id+'"]');
            if(!card || card.querySelector('.auto-figure')) return;
            const prompt=card.querySelector('.qbody .prompt');
            if(prompt) prompt.insertAdjacentHTML('beforebegin',cpmFigure);
          });
        }
        addFigures();
        const observer=new MutationObserver(addFigures);
        observer.observe(document.documentElement,{childList:true,subtree:true});
        setTimeout(addFigures,100);
        setTimeout(addFigures,500);
      })();
      <\/script>`;

      const patched=cleanedHtml.replace('</head>',overrideStyle+'</head>').replace('</body>',enhancement+'</body>');
      document.open();
      document.write(patched);
      document.close();
    }catch(e){
      document.getElementById('status').innerHTML='<h1>読み込みに失敗しました</h1><p>'+String(e.message||e)+'</p>';
      console.error(e);
    }
  })();
  </script>
</body>
</html>
