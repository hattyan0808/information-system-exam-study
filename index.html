<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>情報システムデザイン 満点対策</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f7fb;color:#172033;display:grid;place-items:center;min-height:100vh;padding:24px;box-sizing:border-box}
    .box{max-width:560px;background:#fff;border:1px solid #dde3ee;border-radius:18px;padding:28px;box-shadow:0 12px 36px rgba(25,50,90,.08);text-align:center}
    .spinner{width:34px;height:34px;border:4px solid #dce5f4;border-top-color:#173f7a;border-radius:50%;margin:0 auto 18px;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    h1{font-size:22px;margin:0 0 8px}p{color:#5a6577;line-height:1.7;margin:0}
  </style>
</head>
<body>
  <div class="box" id="status"><div class="spinner"></div><h1>問題サイトを読み込み中</h1><p>初回表示には数秒かかる場合があります。</p></div>
  <script>
  (async()=>{
    try{
      const files=['site_part_1.txt','site_part_2.txt','site_part_3.txt','site_part_4.txt','site_part_5.txt'];
      const parts=await Promise.all(files.map(async f=>{
        const r=await fetch(f,{cache:'no-store'});
        if(!r.ok) throw new Error(f+' の読み込みに失敗しました');
        return (await r.text()).trim();
      }));
      const b64=parts.join('');
      const bin=atob(b64);
      const bytes=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
      const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      const html=await new Response(stream).text();
      const overrideStyle=`<style>
        .topbar{position:static!important;top:auto!important}
        .sticky-mini{position:static!important;top:auto!important}
        @media(max-width:820px){.sidebar{position:static!important;top:auto!important}}
      </style>`;
      const patched=html.replace('</head>',overrideStyle+'</head>');
      document.open();
      document.write(patched);
      document.close();
    }catch(e){
      document.getElementById('status').innerHTML='<h1>読み込みに失敗しました</h1><p>'+String(e.message||e)+'</p>';
      console.error(e);
    }
  })();
  </script>
</body>
</html>
