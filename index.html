<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>情報システムデザイン 満点対策</title>
<style>
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f7fb;color:#172033;display:grid;place-items:center;min-height:100vh;padding:24px;box-sizing:border-box}.box{max-width:560px;background:#fff;border:1px solid #dde3ee;border-radius:18px;padding:28px;box-shadow:0 12px 36px rgba(25,50,90,.08);text-align:center}.spinner{width:34px;height:34px;border:4px solid #dce5f4;border-top-color:#173f7a;border-radius:50%;margin:0 auto 18px;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}h1{font-size:22px;margin:0 0 8px}p{color:#5a6577;line-height:1.7;margin:0}
</style>

<body>
<div class="box" id="status"><div class="spinner"></div><h1>問題サイトを読み込み中</h1><p>初回表示には数秒かかる場合があります。</p></div>
<script>
(async()=>{try{
const files=['site_part_1.txt','site_part_2.txt','site_part_3.txt','site_part_4.txt','site_part_5.txt'];
const parts=await Promise.all(files.map(async f=>{const r=await fetch(f,{cache:'no-store'});if(!r.ok)throw new Error(f+' の読み込みに失敗しました');return(await r.text()).trim()}));
const bin=atob(parts.join(''));const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));let html=await new Response(stream).text();
html=html.replace('<button class="btn-ghost" onclick="openPracticePreset(\'cp\')">クリティカルパス図を解く</button>','');

const enhance=`<script>(()=>{
for(let i=Q.length-1;i>=0;i--){const q=Q[i];if(q.category==='全範囲ドリル'||(q.category!=='過去問'&&q.type==='text'))Q.splice(i,1)}
const f1=Q.find(q=>q.id==='fig01');if(f1)f1.type='calc';
const opt=document.querySelector('#practiceType option[value="text"]');if(opt)opt.remove();
const drillOpt=document.querySelector('#practiceGroup option[value="全範囲ドリル"]');if(drillOpt)drillOpt.remove();
document.querySelectorAll('#mock p').forEach(p=>{p.innerHTML=p.innerHTML.replace('記述・計算','計算').replace('記述・計算は','計算問題は')});

const web='<div class="auto-figure"><svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg"><style>.b{fill:#fff;stroke:#5a5fdb;stroke-width:2}.x{font:600 17px system-ui;fill:#172033;text-anchor:middle;dominant-baseline:middle}.k{stroke:#5a5fdb;stroke-width:2}.z{stroke-dasharray:7 5}</style><rect class="b" x="20" y="120" width="170" height="60" rx="12"/><text class="x" x="105" y="150">a 負荷分散装置</text><rect class="b" x="250" y="60" width="160" height="60" rx="12"/><text class="x" x="330" y="90">b Webサーバ1</text><rect class="b" x="250" y="180" width="160" height="60" rx="12"/><text class="x" x="330" y="210">c Webサーバ2</text><rect class="b" x="500" y="50" width="170" height="70" rx="12"/><text class="x" x="585" y="78">d DBサーバ</text><text class="x" x="585" y="102">アクティブ</text><rect class="b" x="500" y="180" width="170" height="70" rx="12"/><text class="x" x="585" y="208">e DBサーバ</text><text class="x" x="585" y="232">スタンバイ</text><ellipse class="b" cx="800" cy="150" rx="85" ry="65"/><text class="x" x="800" y="140">f ストレージ</text><text class="x" x="800" y="166">RAID5</text><line class="k" x1="190" y1="150" x2="250" y2="90"/><line class="k" x1="190" y1="150" x2="250" y2="210"/><line class="k" x1="410" y1="90" x2="500" y2="85"/><line class="k" x1="410" y1="210" x2="500" y2="215"/><line class="k" x1="670" y1="85" x2="715" y2="120"/><line class="k" x1="670" y1="215" x2="715" y2="180"/></svg><div class="figurecap">Webサーバは並列、DBはアクティブ／スタンバイ構成として考える。</div></div>';
function add(){[['22a13','cpm'],['22b13','cpm'],['23a13','cpm'],['23b13','cpm'],['2413','cpm'],['2516','cpm'],['22a14','web'],['22a15','web'],['22a16','web'],['23a14','web'],['23a15','web'],['23a16','web'],['2414','web']].forEach(([id,t])=>{const card=document.querySelector('article[data-id="'+id+'"]');if(!card||card.querySelector('.auto-figure'))return;const p=card.querySelector('.qbody .prompt');if(p)p.insertAdjacentHTML('beforebegin',t==='cpm'?cpm:web)})}
try{renderPractice();renderCalc();renderDrill();updateStats()}catch(e){}
add();new MutationObserver(add).observe(document.documentElement,{childList:true,subtree:true});setTimeout(add,100);setTimeout(add,500)
})();<\/script>`;
html=html.replace('</head>',css+'</head>').replace('</body>',enhance+'</body>');document.open();document.write(html);document.close();
}catch(e){document.getElementById('status').innerHTML='<h1>読み込みに失敗しました</h1><p>'+String(e.message||e)+'</p>';console.error(e)}})();
</script>
</body></html>
